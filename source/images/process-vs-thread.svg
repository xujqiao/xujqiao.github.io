<svg viewBox="0 0 680 380" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>进程切换 vs 线程切换 - 切换数据对比</title>
  <desc>两列对比：7项切换数据中，页表是唯一不同项——进程需切CR3/TLB全清，线程不切页表</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="25" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="500">进程切换 vs 线程切换：要切换的数据</text>
  <!-- Headers -->
  <rect x="40" y="55" width="130" height="32" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="105" y="71" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500">切换项</text>
  <rect x="185" y="55" width="210" height="32" rx="8" fill="#F7C1C1" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="290" y="71" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#A32D2D">进程</text>
  <rect x="410" y="55" width="210" height="32" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="515" y="71" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500" fill="#854F0B">线程（同进程）</text>
  <!-- Row 1: Page table -->
  <rect x="40" y="105" width="130" height="36" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="105" y="123" text-anchor="middle" dominant-baseline="central" font-size="12">页表（CR3）</text>
  <rect x="185" y="105" width="210" height="36" rx="6" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="290" y="123" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#A32D2D">需切换，TLB 全清</text>
  <rect x="410" y="105" width="210" height="36" rx="6" fill="#C0DD97" stroke="#639922" stroke-width="0.5"/>
  <text x="515" y="123" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3B6D11">不切换，TLB 继续命中</text>
  <!-- Row 2: Kernel stack -->
  <rect x="40" y="150" width="130" height="36" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="105" y="168" text-anchor="middle" dominant-baseline="central" font-size="12">内核栈指针</text>
  <rect x="185" y="150" width="210" height="36" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="290" y="168" text-anchor="middle" dominant-baseline="central" font-size="12">需切换</text>
  <rect x="410" y="150" width="210" height="36" rx="6" fill="#FAEEDA" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="515" y="168" text-anchor="middle" dominant-baseline="central" font-size="12">需切换</text>
  <!-- Row 3: General registers -->
  <rect x="40" y="195" width="130" height="36" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="105" y="213" text-anchor="middle" dominant-baseline="central" font-size="12">通用寄存器</text>
  <rect x="185" y="195" width="210" height="36" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="290" y="213" text-anchor="middle" dominant-baseline="central" font-size="12">需切换</text>
  <rect x="410" y="195" width="210" height="36" rx="6" fill="#FAEEDA" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="515" y="213" text-anchor="middle" dominant-baseline="central" font-size="12">需切换</text>
  <!-- Row 4: User stack -->
  <rect x="40" y="240" width="130" height="36" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="105" y="258" text-anchor="middle" dominant-baseline="central" font-size="12">用户栈指针</text>
  <rect x="185" y="240" width="210" height="36" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="290" y="258" text-anchor="middle" dominant-baseline="central" font-size="12">需切换</text>
  <rect x="410" y="240" width="210" height="36" rx="6" fill="#FAEEDA" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="515" y="258" text-anchor="middle" dominant-baseline="central" font-size="12">需切换</text>
  <!-- Row 5: FPU/AVX -->
  <rect x="40" y="285" width="130" height="36" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="105" y="303" text-anchor="middle" dominant-baseline="central" font-size="12">FPU/AVX</text>
  <rect x="185" y="285" width="210" height="36" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="290" y="303" text-anchor="middle" dominant-baseline="central" font-size="12">懒切换</text>
  <rect x="410" y="285" width="210" height="36" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="515" y="303" text-anchor="middle" dominant-baseline="central" font-size="12">懒切换</text>
  <!-- Row 6: TLS -->
  <rect x="40" y="330" width="130" height="36" rx="6" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="105" y="348" text-anchor="middle" dominant-baseline="central" font-size="12">TLS 段寄存器</text>
  <rect x="185" y="330" width="210" height="36" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="290" y="348" text-anchor="middle" dominant-baseline="central" font-size="12">需切换</text>
  <rect x="410" y="330" width="210" height="36" rx="6" fill="#FAEEDA" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="515" y="348" text-anchor="middle" dominant-baseline="central" font-size="12">需切换</text>
</svg>