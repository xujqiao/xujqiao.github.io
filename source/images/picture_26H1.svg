<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%" role="img">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
  markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
    stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Muted wall -->
<path d="M8 8 Q340 3 672 8 L672 512 Q340 517 8 512 Z" fill="#d8d3cc" stroke="#b8b0a5" stroke-width="1.8"/>

<!-- Wall shadow / damp patch -->
<path d="M60 60 Q130 55 210 65 Q230 110 210 160 Q150 170 80 155 Q55 110 60 60 Z" fill="#c8bfb5" opacity="0.4"/>
<path d="M480 40 Q530 35 590 45 Q610 80 595 120 Q540 130 485 115 Q465 80 480 40 Z" fill="#c8bfb5" opacity="0.3"/>

<!-- Floor line -->
<path d="M-5 375 Q170 370 340 373 Q510 368 685 375" fill="none" stroke="#b8b0a5" stroke-width="1.8"/>

<!-- Window -->
<path d="M60 42 Q70 38 78 42 L238 38 Q245 42 243 48 L240 268 Q237 275 232 272 L70 275 Q63 273 65 267 Z" fill="none" stroke="#a09890" stroke-width="3" stroke-linejoin="round"/>
<path d="M73 52 Q150 48 233 52 L228 260 Q150 263 73 260 Z" fill="#b8bfc8" stroke="none"/>

<!-- Thin bright patch - sky lightening up -->
<ellipse cx="145" cy="120" rx="50" ry="60" fill="#d0d8e0" opacity="0.15"/>

<!-- Overcast sky - slightly thinner -->
<g fill="none" stroke="#9a9ea8" stroke-width="0.8" opacity="0.3">
  <path d="M80 60 Q120 55 160 62 Q200 58 230 65"/>
  <path d="M90 80 Q130 75 170 82 Q200 78 225 84"/>
</g>

<!-- Lighter rain - fewer streaks -->
<g stroke="#aab0ba" stroke-width="1.5" stroke-linecap="round" opacity="0.25">
  <path d="M90 65 L80 80"/>
  <path d="M195 58 L185 73"/>
  <path d="M100 110 L90 125"/>
  <path d="M210 95 L200 110"/>
  <path d="M85 150 L75 165"/>
  <path d="M155 145 L145 160"/>
  <path d="M95 195 L85 210"/>
  <path d="M175 190 L165 205"/>
  <path d="M150 235 L140 250"/>
</g>

<!-- Water trickle -->
<path d="M120 55 Q118 90 122 140 Q125 170 120 200" fill="none" stroke="#aab0ba" stroke-width="1.2" opacity="0.2"/>

<!-- Window cross bars -->
<path d="M63 162 L237 160" stroke="#a09890" stroke-width="3" stroke-linecap="round"/>
<path d="M152 42 L150 268" stroke="#a09890" stroke-width="3" stroke-linecap="round"/>

<!-- Curtain -->
<path d="M50 36 Q46 55 48 80 Q45 145 47 272 Q57 267 65 270 L62 36 Z" fill="#c0b5a8" opacity="0.5" stroke="#a09890" stroke-width="1.5"/>

<!-- Desk -->
<path d="M-5 348 Q170 335 340 338 Q510 332 685 346 L690 525 L-10 525 Z" fill="#c9b89a" stroke="#b0a088" stroke-width="2.5" stroke-linejoin="round"/>
<path d="M-5 348 Q170 335 340 338 Q510 332 685 346" fill="none" stroke="#b0a088" stroke-width="2.5" stroke-linecap="round"/>

<!-- Desk grain -->
<g stroke="#b8a888" stroke-width="0.8" opacity="0.3" fill="none" stroke-linecap="round">
  <path d="M50 365 Q180 360 320 363"/>
  <path d="M120 400 Q280 395 460 398"/>
  <path d="M80 440 Q250 435 480 437"/>
</g>

<!-- Person - lifting head up -->
<path d="M368 228 Q365 258 361 288 Q358 313 353 338" fill="none" stroke="#666" stroke-width="3" stroke-linecap="round"/>
<path d="M340 238 Q352 231 370 228 L432 225 Q448 229 458 238" fill="none" stroke="#666" stroke-width="3" stroke-linecap="round"/>
<path d="M355 242 Q340 274 337 312 Q335 332 348 338" fill="none" stroke="#777" stroke-width="3" stroke-linecap="round"/>
<path d="M337 312 Q328 319 322 322" fill="none" stroke="#777" stroke-width="2.5" stroke-linecap="round"/>
<path d="M440 242 Q460 274 462 312 Q464 332 452 338" fill="none" stroke="#777" stroke-width="3" stroke-linecap="round"/>
<path d="M462 312 Q472 319 477 322" fill="none" stroke="#777" stroke-width="2.5" stroke-linecap="round"/>
<!-- Hands -->
<ellipse cx="322" cy="325" rx="9" ry="5" fill="#d8d0c0" stroke="#888" stroke-width="1.5"/>
<ellipse cx="477" cy="325" rx="9" ry="5" fill="#d8d0c0" stroke="#888" stroke-width="1.5"/>

<!-- Head - lifted slightly -->
<ellipse cx="398" cy="226" rx="29" ry="31" fill="#d8d0c0" stroke="#666" stroke-width="2.5"/>
<path d="M370 217 Q372 197 384 190 Q398 183 414 190 Q425 197 427 217" fill="none" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
<path d="M373 211 Q378 200 390 193 Q400 188 410 193 Q420 200 424 211" fill="none" stroke="#555" stroke-width="2" stroke-linecap="round"/>

<!-- Eyes - flat, looking straight -->
<path d="M383 224 L393 224" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
<path d="M404 224 L414 224" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
<!-- Eyebrows -->
<path d="M382 216 L394 217" fill="none" stroke="#666" stroke-width="1.3" stroke-linecap="round"/>
<path d="M404 217 L416 216" fill="none" stroke="#666" stroke-width="1.3" stroke-linecap="round"/>

<!-- Score paper - face down -->
<g transform="translate(370, 312) rotate(-12)">
  <rect x="0" y="0" width="100" height="75" rx="3" fill="#f5efe0" stroke="#b0a898" stroke-width="1.5"/>
  <path d="M0 15 Q35 12 50 18 Q70 22 100 15" fill="none" stroke="#d8d0b8" stroke-width="1"/>
  <path d="M20 0 Q22 30 18 50 Q15 65 18 75" fill="none" stroke="#d8d0b8" stroke-width="0.8"/>
  <path d="M45 32 Q52 30 58 33 Q52 38 45 36 Z" fill="#c88060" opacity="0.25"/>
  <path d="M48 40 Q55 38 60 41" fill="none" stroke="#c88060" stroke-width="1" opacity="0.2" stroke-linecap="round"/>
</g>

<!-- Crumpled paper on floor -->
<g transform="translate(325, 375) rotate(25)">
  <path d="M0 0 Q6 2 10 -1 Q14 4 16 2 Q12 10 0 8 Z" fill="#e8e0d0" stroke="#b8b0a0" stroke-width="1" opacity="0.5"/>
</g>
<g transform="translate(490, 382) rotate(-20)">
  <path d="M0 0 Q5 3 9 0 Q12 5 14 2 Q10 9 0 7 Z" fill="#e8e0d0" stroke="#b8b0a0" stroke-width="1" opacity="0.4"/>
</g>
<g transform="translate(380, 378) rotate(-30)">
  <path d="M0 0 Q6 3 10 0 Q8 7 0 6 Z" fill="#e8e0d0" stroke="#b8b0a0" stroke-width="1" opacity="0.35"/>
</g>

<!-- Steaming tea cup -->
<g transform="translate(290, 330)">
  <ellipse cx="0" cy="0" rx="16" ry="5" fill="#b0a088" opacity="0.3"/>
  <path d="M-10 -1 L-10 -18 Q-10 -23 -5 -23 L5 -23 Q10 -23 10 -18 L10 -1 Z" fill="#e8e0d0" stroke="#b0a898" stroke-width="1.5"/>
  <!-- Tea inside -->
  <ellipse cx="0" cy="-18" rx="8" ry="3" fill="#c8a050" opacity="0.6"/>
  <!-- Handle -->
  <path d="M10 -12 Q18 -12 18 -17 Q18 -22 10 -20" fill="none" stroke="#b0a898" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Steam -->
  <g fill="none" stroke="#d8d0c0" stroke-width="1" stroke-linecap="round" opacity="0.35">
    <path d="M-2 -26 Q-4 -32 -2 -38 Q0 -44 -3 -48"/>
    <path d="M2 -25 Q5 -30 3 -36 Q1 -42 4 -46"/>
    <path d="M-4 -24 Q-7 -29 -5 -34" opacity="0.25"/>
  </g>
</g>

<!-- Sticky note on desk corner -->
<g transform="translate(600, 360) rotate(-5)">
  <rect x="0" y="0" width="40" height="35" rx="1" fill="#f5e8c0" stroke="#d8c898" stroke-width="1" opacity="0.6"/>
  <!-- Folded corner peeling up -->
  <path d="M32 0 L40 0 L40 8 Z" fill="#e8d8a8" stroke="#d0c088" stroke-width="0.8" opacity="0.7"/>
  <!-- Faded handwritten lines (illegible) -->
  <path d="M6 10 Q20 9 34 11" fill="none" stroke="#b0a070" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>
  <path d="M6 18 Q20 17 34 19" fill="none" stroke="#b0a070" stroke-width="0.8" opacity="0.3" stroke-linecap="round"/>
  <path d="M6 26 Q18 25 28 27" fill="none" stroke="#b0a070" stroke-width="0.8" opacity="0.25" stroke-linecap="round"/>
</g>

<!-- Lamp - tilted, dim -->
<ellipse cx="575" cy="348" rx="26" ry="8" fill="#a09890" stroke="#888" stroke-width="2"/>
<path d="M575 342 Q578 300 580 260 Q581 250 583 243" fill="none" stroke="#999" stroke-width="3" stroke-linecap="round"/>
<path d="M554 235 Q560 224 572 223 Q575 225 579 223 Q590 224 596 235 L593 245 Q582 240 572 238 Q562 239 554 245 Z" fill="#c8b898" stroke="#a09890" stroke-width="2"/>
<ellipse cx="572" cy="295" rx="40" ry="55" fill="#e8d8b0" opacity="0.06"/>
<ellipse cx="572" cy="295" rx="20" ry="30" fill="#e8d8b0" opacity="0.05"/>

<!-- Overhead cold light -->
<rect x="285" y="10" width="110" height="6" rx="2" fill="#888" stroke="#777" stroke-width="1"/>
<ellipse cx="340" cy="150" rx="80" ry="130" fill="#a0a0b0" opacity="0.04"/>

<!-- Floor area -->
<path d="M-5 480 Q170 488 340 483 Q510 488 690 480 L690 525 L-10 525 Z" fill="#c8c0b5" opacity="0.3"/>

<!-- Chair -->
<line x1="438" y1="255" x2="444" y2="348" stroke="#888" stroke-width="3" stroke-linecap="round"/>
<line x1="462" y1="255" x2="466" y2="348" stroke="#888" stroke-width="3" stroke-linecap="round"/>
<line x1="438" y1="255" x2="462" y2="255" stroke="#888" stroke-width="3"/>
<line x1="444" y1="348" x2="448" y2="415" stroke="#888" stroke-width="3"/>
<line x1="466" y1="348" x2="462" y2="415" stroke="#888" stroke-width="3"/>
<line x1="448" y1="415" x2="462" y2="415" stroke="#888" stroke-width="2.5"/>

<!-- Floor dust -->
<g fill="#b0a898" opacity="0.15">
  <circle cx="60" cy="430" r="1.5"/>
  <circle cx="280" cy="420" r="1.5"/>
  <circle cx="520" cy="440" r="1"/>
  <circle cx="630" cy="425" r="1.5"/>
  <circle cx="180" cy="460" r="1"/>
  <circle cx="420" cy="470" r="1.5"/>
</g>
</svg>