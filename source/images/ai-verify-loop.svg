<svg viewBox="0 0 680 340" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>AI 概率性产出 + 确定性校验迭代流程</title>
  <desc>循环流程：需求 → AI概率生成 → 确定性校验工具 → 通过则输出，不通过则反馈给AI重新生成，迭代逼近目标结果</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="25" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="500">AI 时代减少上下文切换的思路</text>
  <!-- Left: 需求 -->
  <rect x="40" y="200" width="100" height="56" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="90" y="218" text-anchor="middle" dominant-baseline="central" font-size="12">需求</text>
  <text x="90" y="234" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0C447C">交给 AI</text>
  <!-- Arrow -->
  <line x1="140" y1="228" x2="175" y2="228" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Top right: AI generation -->
  <rect x="180" y="120" width="140" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="250" y="138" text-anchor="middle" dominant-baseline="central" font-size="12">AI 概率性生成</text>
  <text x="250" y="158" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#3C3489">输出不确定</text>
  <!-- Arrow down -->
  <line x1="250" y1="176" x2="250" y2="200" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Bottom: verification -->
  <rect x="180" y="205" width="140" height="56" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="250" y="223" text-anchor="middle" dominant-baseline="central" font-size="12">确定性校验工具</text>
  <text x="250" y="243" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#27500A">编译器 / 测试脚本 / 规范</text>
  <!-- Checkmark -->
  <text x="290" y="238" text-anchor="middle" dominant-baseline="central" font-size="13" fill="#639922">v</text>
  <!-- Right arrow: pass -->
  <line x1="320" y1="233" x2="355" y2="233" stroke="#639922" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Right: 输出 -->
  <rect x="360" y="205" width="100" height="56" rx="10" fill="#97C459" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="410" y="223" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#173404">确定输出</text>
  <text x="410" y="243" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#27500A">通过</text>
  <!-- Loop back arrow: fail -->
  <line x1="250" y1="261" x2="250" y2="290" stroke="#E24B4A" stroke-width="1.5"/>
  <line x1="250" y1="290" x2="90" y2="290" stroke="#E24B4A" stroke-width="1.5"/>
  <line x1="90" y1="290" x2="90" y2="260" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="170" y="305" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#A32D2D">不通过 → 反馈 AI 重新生成</text>
  <!-- Annotation -->
  <rect x="40" y="55" width="600" height="44" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="73" text-anchor="middle" dominant-baseline="central" font-size="12">核心：把不确定性交给 AI，把确定性校验交给代码/工具</text>
  <text x="340" y="90" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#854F0B">反复迭代，逐步逼近目标结果</text>
</svg>