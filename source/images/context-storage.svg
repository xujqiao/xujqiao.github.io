<svg viewBox="0 0 680 380" width="100%" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>上下文存储位置 - 内核栈、task_struct、堆内存</title>
  <desc>左边进程/线程切换：用户态→中断/系统调用→内核态保存到内核栈①，再搬到task_struct②。右边协程切换：纯用户态，co_yield保存到stCoRoutine_t结构体</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="340" y="25" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="500">上下文存到了哪里？两类切换，三个地方</text>
  <rect x="35" y="55" width="310" height="300" rx="16" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="190" y="78" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500">进程/线程上下文切换（经过内核）</text>
  <rect x="55" y="100" width="270" height="100" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="190" y="118" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0C447C">用户态</text>
  <rect x="70" y="130" width="100" height="56" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="120" y="148" text-anchor="middle" dominant-baseline="central" font-size="11">进程/线程 A</text>
  <text x="120" y="164" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#0C447C">用户寄存器状态</text>
  <line x1="190" y1="200" x2="190" y2="225" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="260" y="215" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#378ADD">中断/系统调用</text>
  <rect x="55" y="230" width="270" height="110" rx="10" fill="#FCEBEB" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="190" y="248" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#A32D2D">内核态</text>
  <rect x="70" y="260" width="110" height="36" rx="6" fill="#F7C1C1" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="125" y="278" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#791F1F">① A 的内核栈</text>
  <text x="125" y="292" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#A32D2D">保存用户寄存器</text>
  <line x1="180" y1="278" x2="205" y2="278" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="210" y="260" width="100" height="36" rx="6" fill="#FCEBEB" stroke="#791F1F" stroke-width="0.5"/>
  <text x="260" y="278" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#501313">② task_struct</text>
  <text x="260" y="292" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#791F1F">thread_struct 保存</text>
  <text x="190" y="325" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#A32D2D">内核栈 → 进程/线程控制块（PCB/TCB）</text>
  <rect x="370" y="55" width="275" height="300" rx="16" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="507" y="78" text-anchor="middle" dominant-baseline="central" font-size="13" font-weight="500">协程上下文切换（纯用户态）</text>
  <rect x="390" y="100" width="235" height="200" rx="10" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="507" y="118" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3B6D11">用户态</text>
  <rect x="405" y="135" width="100" height="44" rx="6" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="455" y="153" text-anchor="middle" dominant-baseline="central" font-size="11">协程 A 运行中</text>
  <text x="455" y="168" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#3B6D11">寄存器在 CPU 里</text>
  <line x1="455" y1="179" x2="455" y2="195" stroke="#639922" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="530" y="190" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#639922">co_yield</text>
  <rect x="405" y="200" width="100" height="44" rx="6" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="455" y="216" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#27500A">stCoRoutine_t</text>
  <text x="455" y="232" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#3B6D11">保存 14 个寄存器</text>
  <rect x="390" y="258" width="235" height="30" rx="6" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="507" y="276" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0C447C">栈（共享栈模式自动保存/恢复）</text>
  <text x="507" y="325" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#3B6D11">协程结构体 + 栈 → 堆内存（用户态）</text>
</svg>